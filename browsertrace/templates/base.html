<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>{% block title %}BrowserTrace{% endblock %}</title>
<style>
  :root {
    --fg: #1a1a1a;
    --muted: #6b7280;
    --border: #e5e7eb;
    --bg: #fafafa;
    --panel: #ffffff;
    --accent: #2563eb;
    --ok: #059669;
    --err: #dc2626;
    --warn: #d97706;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: -apple-system, system-ui, "Segoe UI", Roboto, "Helvetica Neue", sans-serif;
    color: var(--fg);
    background: var(--bg);
    font-size: 14px;
    line-height: 1.5;
  }
  header {
    background: var(--panel);
    border-bottom: 1px solid var(--border);
    padding: 12px 24px;
    display: flex;
    align-items: center;
    gap: 12px;
  }
  header a { text-decoration: none; color: var(--fg); font-weight: 600; }
  header .meta { color: var(--muted); font-size: 12px; }
  main { padding: 24px; max-width: 1200px; margin: 0 auto; }
  h1 { font-size: 20px; margin: 0 0 16px; }
  h2 { font-size: 16px; margin: 24px 0 8px; }
  table { width: 100%; border-collapse: collapse; background: var(--panel); }
  th, td { text-align: left; padding: 10px 12px; border-bottom: 1px solid var(--border); }
  th { font-weight: 600; color: var(--muted); font-size: 12px; text-transform: uppercase; letter-spacing: 0.05em; }
  tr:hover td { background: #f9fafb; cursor: pointer; }
  .status { display: inline-block; padding: 2px 8px; border-radius: 12px; font-size: 12px; font-weight: 500; }
  .status-completed { background: #d1fae5; color: var(--ok); }
  .status-failed { background: #fee2e2; color: var(--err); }
  .status-running { background: #fef3c7; color: var(--warn); }
  a { color: var(--accent); text-decoration: none; }
  a:hover { text-decoration: underline; }
  .empty { color: var(--muted); padding: 48px; text-align: center; background: var(--panel); border: 1px dashed var(--border); border-radius: 8px; }
  code { font-family: ui-monospace, SFMono-Regular, Menlo, monospace; font-size: 12px; background: #f3f4f6; padding: 1px 4px; border-radius: 3px; }
  pre { font-family: ui-monospace, SFMono-Regular, Menlo, monospace; font-size: 12px; background: #f3f4f6; padding: 12px; border-radius: 6px; overflow: auto; max-height: 280px; }
</style>
</head>
<body>
<header>
  <a href="/">BrowserTrace</a>
  <span class="meta">{% block subtitle %}{% endblock %}</span>
</header>
<main>{% block content %}{% endblock %}</main>
</body>
</html>
