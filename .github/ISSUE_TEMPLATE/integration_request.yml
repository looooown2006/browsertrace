name: Integration request
description: Request or propose support for an agent/browser framework.
title: "Integration: "
labels: ["enhancement", "integration"]
body:
  - type: dropdown
    id: stack
    attributes:
      label: Target stack
      options:
        - Browser Use
        - Stagehand
        - Playwright + LLM script
        - Skyvern
        - Custom computer-use agent
        - Other
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Version or docs link
      description: Mention the framework version, docs URL, or repo URL if available.
      placeholder: "Example: stagehand 2.x, browser-use main, https://..."
    validations:
      required: false
  - type: textarea
    id: failure
    attributes:
      label: Failure you want to debug
      description: Describe the browser-agent failure that current logs do not explain.
      placeholder: "Example: the agent clicked the wrong result after observe(), but the logs did not show the screenshot or model output that caused it."
    validations:
      required: true
  - type: checkboxes
    id: capture
    attributes:
      label: What should BrowserTrace capture?
      options:
        - label: Screenshot at each step
        - label: Current URL
        - label: Action or tool call name
        - label: Model input
        - label: Model output
        - label: Selector or element target
        - label: DOM snapshot or extracted text
        - label: Workflow state or task metadata
        - label: Error message and failed step
  - type: textarea
    id: target-evidence
    attributes:
      label: Target-selection evidence, if relevant
      description: For wrong-target failures, include the selected element, intended element, nearby candidates, bounding boxes, accessible name/role/text, and whether the tooltip or label only appears after hover. If sharing trace evidence publicly, use `browsertrace export <run_id> --public -o public.html`.
      placeholder: |
        Selected: ...
        Intended: ...
        Nearby candidates / boxes: ...
        Accessible name, role, text: ...
        Tooltip or hover-only label: ...
    validations:
      required: false
  - type: textarea
    id: recovery-evidence
    attributes:
      label: Persistent browser recovery evidence, if relevant
      description: For custom computer-use or persistent-browser failures before the first screenshot or URL, include session_mode, a redacted profile id or user data directory token, browser/session/target id, profile lock or stale process signal, CDP attach/probe timing and timeout, approval source, recovery action, and final connection state. See https://aaronlab.github.io/browsertrace/computer-use-agent-debugging.html.
      placeholder: |
        session_mode: ...
        redacted profile id or user data directory token: ...
        browser/session/target id: ...
        profile lock or stale process signal: ...
        CDP attach/probe timing and timeout: ...
        approval source: ...
        recovery action: ...
        final connection state: ...
    validations:
      required: false
  - type: textarea
    id: hooks
    attributes:
      label: Relevant hooks or API calls
      description: Which functions should an adapter wrap or observe?
      placeholder: "Example: Stagehand act/extract/observe/agent, Browser Use Agent.step, a Playwright page wrapper..."
    validations:
      required: true
  - type: textarea
    id: sample
    attributes:
      label: Minimal safe sample
      description: Link docs or paste a small sanitized snippet showing where BrowserTrace could attach. Do not include private prompts, secrets, or customer data. If attaching a trace publicly, use `browsertrace export <run_id> --public -o public.html`.
    validations:
      required: false
  - type: markdown
    attributes:
      value: |
        For security-sensitive reports or private trace data, follow `SECURITY.md` before sharing details publicly.

        Stack guides that may help before filing or contributing a small follow-up:

        - Browser Use guide: https://aaronlab.github.io/browsertrace/browser-use-debugging.html
        - Stagehand guide: https://aaronlab.github.io/browsertrace/stagehand-debugging.html
        - Skyvern guide: https://aaronlab.github.io/browsertrace/skyvern-debugging.html
        - Playwright + LLM guide: https://aaronlab.github.io/browsertrace/playwright-llm-debugging.html
        - Computer-use guide: https://aaronlab.github.io/browsertrace/computer-use-agent-debugging.html

        For a small docs or example fix after filing, use `CONTRIBUTING.md#first-pr-recipe`; it keeps the first contribution small and reviewable.
  - type: textarea
    id: diagnostics
    attributes:
      label: JSON CLI troubleshooting output
      description: For integration requests, CI, or AI/coding-agent troubleshooting, include these checks when the request comes from a local first run, failed trace, or CI issue.
      placeholder: |
        browsertrace doctor --json
        browsertrace list --status failed --json
        browsertrace show <run_id> --json
    validations:
      required: false
  - type: checkboxes
    id: help
    attributes:
      label: Can you help validate it?
      options:
        - label: I can test a preview adapter on my workflow
        - label: I can share an anonymized exported trace
        - label: I can contribute or review a PR
