name: Bug report
description: Report a BrowserTrace bug or broken trace/debugging workflow.
title: "Bug: "
labels: ["bug"]
body:
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: Describe the broken behavior and what you expected instead.
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: BrowserTrace version
      placeholder: "0.1.11"
    validations:
      required: true
  - type: dropdown
    id: integration
    attributes:
      label: Agent/browser stack
      options:
        - Playwright
        - Browser Use
        - Stagehand
        - Skyvern
        - Custom browser agent
        - Other
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Reproduction steps
      description: Include the smallest script or command sequence that reproduces the issue.
      placeholder: |
        1. Run ...
        2. Open ...
        3. See ...
    validations:
      required: true
  - type: textarea
    id: trace
    attributes:
      label: Trace/export details
      description: Attach an exported HTML trace or paste relevant `browsertrace show <id>` output if possible. For public sharing, run `browsertrace export <run_id> --public -o public.html` to omit prompt/model I/O, screenshots, and URLs.
    validations:
      required: false
  - type: markdown
    attributes:
      value: |
        For security-sensitive reports or private trace data, follow `SECURITY.md` before sharing details publicly.

        For a small docs fix after filing, use `CONTRIBUTING.md#first-pr-recipe`; it keeps the first contribution small and reviewable.
  - type: textarea
    id: diagnostics
    attributes:
      label: JSON CLI troubleshooting output
      description: For issue reports, CI, or AI/coding-agent troubleshooting, include these checks when the problem involves a local first run or trace inspection.
      placeholder: |
        browsertrace doctor --json
        browsertrace list --status failed --json
        browsertrace show <run_id> --json
    validations:
      required: false
