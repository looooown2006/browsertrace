name: Feature request
description: Suggest an improvement to BrowserTrace.
title: "Feature: "
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What browser-agent debugging problem would this solve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: Describe the smallest useful version of the feature.
    validations:
      required: true
  - type: markdown
    attributes:
      value: |
        For a small docs or example fix after proposing a feature, use `CONTRIBUTING.md#first-pr-recipe`; it keeps the first contribution small and reviewable.
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - SDK
        - CLI
        - Local UI
        - Export
        - AI summary
        - Framework integration
        - Documentation
        - Other
    validations:
      required: true
