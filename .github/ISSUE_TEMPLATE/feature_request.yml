name: Feature request
description: Suggest an improvement to BrowserTrace.
title: "Feature: "
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What browser-agent debugging problem would this solve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: Describe the smallest useful version of the feature.
    validations:
      required: true
  - type: markdown
    attributes:
      value: |
        For security-sensitive reports or private trace data, follow the [Security Policy](https://github.com/aaronlab/browsertrace/blob/main/SECURITY.md) before sharing details publicly.

        Stack guides that may help scope the feature request:

        - Browser Use guide: https://aaronlab.github.io/browsertrace/browser-use-debugging.html
        - Stagehand guide: https://aaronlab.github.io/browsertrace/stagehand-debugging.html
        - Skyvern guide: https://aaronlab.github.io/browsertrace/skyvern-debugging.html
        - Playwright + LLM guide: https://aaronlab.github.io/browsertrace/playwright-llm-debugging.html
        - Computer-use guide: https://aaronlab.github.io/browsertrace/computer-use-agent-debugging.html

        For a small docs or example fix after proposing a feature, use `CONTRIBUTING.md#first-pr-recipe`; it keeps the first contribution small and reviewable.
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - SDK
        - CLI
        - Local UI
        - Export
        - AI summary
        - Framework integration
        - Documentation
        - Other
    validations:
      required: true
