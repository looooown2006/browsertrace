<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="640" viewBox="0 0 1280 640" role="img" aria-labelledby="title desc">
  <title id="title">BrowserTrace</title>
  <desc id="desc">Local flight recorder for AI browser agents</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#101820"/>
      <stop offset="48%" stop-color="#14252b"/>
      <stop offset="100%" stop-color="#241f18"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#2dd4bf"/>
      <stop offset="55%" stop-color="#60a5fa"/>
      <stop offset="100%" stop-color="#f59e0b"/>
    </linearGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="18"/>
    </filter>
  </defs>

  <rect width="1280" height="640" fill="url(#bg)"/>
  <rect x="0" y="0" width="1280" height="640" fill="#ffffff" opacity="0.025"/>

  <g opacity="0.22" filter="url(#soft)">
    <path d="M126 486 C 320 370, 450 538, 650 420 S 982 316, 1138 382" fill="none" stroke="#2dd4bf" stroke-width="28"/>
    <path d="M190 176 C 358 246, 508 150, 682 226 S 980 280, 1118 190" fill="none" stroke="#f59e0b" stroke-width="22"/>
  </g>

  <g transform="translate(86 78)">
    <rect x="0" y="0" width="164" height="42" rx="21" fill="#0f766e" opacity="0.96"/>
    <text x="82" y="28" text-anchor="middle" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="18" font-weight="700" fill="#ecfeff">OPEN SOURCE</text>

    <text x="0" y="158" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="88" font-weight="800" fill="#f8fafc">BrowserTrace</text>
    <text x="4" y="222" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="34" font-weight="500" fill="#d1d5db">Local flight recorder for AI browser agents</text>

    <g transform="translate(4 282)">
      <rect x="0" y="0" width="182" height="52" rx="26" fill="#112f32" stroke="#2dd4bf" stroke-opacity="0.55"/>
      <text x="91" y="34" text-anchor="middle" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="21" font-weight="700" fill="#ccfbf1">Screenshots</text>

      <rect x="202" y="0" width="166" height="52" rx="26" fill="#16263e" stroke="#60a5fa" stroke-opacity="0.58"/>
      <text x="285" y="34" text-anchor="middle" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="21" font-weight="700" fill="#dbeafe">Model I/O</text>

      <rect x="388" y="0" width="218" height="52" rx="26" fill="#332717" stroke="#f59e0b" stroke-opacity="0.62"/>
      <text x="497" y="34" text-anchor="middle" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="21" font-weight="700" fill="#fef3c7">Failure timeline</text>
    </g>

    <text x="4" y="472" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="28" font-weight="600" fill="#f8fafc">github.com/aaronlab/browsertrace</text>
  </g>

  <g transform="translate(814 118)">
    <rect x="0" y="0" width="364" height="404" rx="18" fill="#0b1117" stroke="#334155" stroke-width="2"/>
    <rect x="20" y="22" width="324" height="172" rx="12" fill="#17202a"/>
    <rect x="38" y="42" width="288" height="16" rx="8" fill="#475569"/>
    <rect x="38" y="72" width="168" height="16" rx="8" fill="#334155"/>
    <rect x="38" y="112" width="236" height="54" rx="8" fill="#1f3438" stroke="#2dd4bf" stroke-opacity="0.4"/>
    <circle cx="304" cy="144" r="14" fill="#f59e0b"/>

    <line x1="58" y1="236" x2="58" y2="354" stroke="#475569" stroke-width="4"/>
    <circle cx="58" cy="236" r="13" fill="#22c55e"/>
    <circle cx="58" cy="296" r="13" fill="#22c55e"/>
    <circle cx="58" cy="354" r="14" fill="#ef4444"/>

    <rect x="88" y="218" width="210" height="34" rx="8" fill="#122b24"/>
    <rect x="88" y="278" width="236" height="34" rx="8" fill="#15233a"/>
    <rect x="88" y="336" width="188" height="34" rx="8" fill="#3a1818"/>

    <text x="108" y="241" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="17" font-weight="700" fill="#bbf7d0">opened page</text>
    <text x="108" y="301" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="17" font-weight="700" fill="#bfdbfe">model chose action</text>
    <text x="108" y="359" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="17" font-weight="700" fill="#fecaca">failed step</text>
  </g>

  <rect x="86" y="560" width="1108" height="6" rx="3" fill="url(#accent)"/>
</svg>
